{% extends "base.html" %}
{% block title %}{{ product.name }} – I-love-geekos{% endblock %}

{% block content %}
<div class="breadcrumb">
  <a href="{{ url_for('index') }}">← Back to shop</a>
</div>

<div class="product-detail">
  <div class="product-detail-emoji">{{ product.emoji }}</div>
  <div class="product-detail-info">
    <span class="product-category">{{ product.category }}</span>
    <h1 class="product-detail-name">{{ product.name }}</h1>
    <p class="product-detail-description">{{ product.description }}</p>
    <div class="product-detail-footer">
      <span class="product-detail-price">${{ "%.2f"|format(product.price) }}</span>
      <form action="{{ url_for('add_to_cart', product_id=product.id) }}" method="post">
        <button type="submit" class="btn-add btn-large">Add to Cart 🛒</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
