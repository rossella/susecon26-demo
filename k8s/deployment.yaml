apiVersion: apps/v1
kind: Deployment
metadata:
  name: ilovegeekos
  namespace: ilovegeekos
  labels:
    app.kubernetes.io/name: ilovegeekos
    app.kubernetes.io/component: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ilovegeekos
  template:
    metadata:
      labels:
        app: ilovegeekos
    spec:
      containers:
        - name: ilovegeekos
          image: ilovegeekos:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: ilovegeekos-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ilovegeekos-secret
                  key: secret-key
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: geeko-data-pvc
