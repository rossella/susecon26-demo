apiVersion: v1
kind: Service
metadata:
  name: ilovegeekos
  namespace: ilovegeekos
  labels:
    app.kubernetes.io/name: ilovegeekos
    app.kubernetes.io/component: app
spec:
  selector:
    app: ilovegeekos
  ports:
    - name: http
      port: 80
      targetPort: 5000
  type: ClusterIP
